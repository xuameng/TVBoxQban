name: jvhuiys Simple JAR Sign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: |
          sdkmanager "build-tools;34.0.0"

      - name: Build Unsigned APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

          APK=$(find app/build/outputs -name "*.apk" | head -n 1)
          mv "$APK" original.apk

          mkdir -p temp_apk
          cd temp_apk
          unzip ../original.apk
          rm -rf META-INF/
          cd ..

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias tvbox \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore temp.jks \
            -storepass tvbox123 \
            -keypass tvbox123 \
            -dname "CN=TVBox, OU=TV, O=TV, L=TV, S=TV, C=CN"

      - name: JAR Sign APK
        run: |
          cd temp_apk
          zip -r ../unsigned.apk .
          cd ..

          jarsigner -verbose \
            -sigalg SHA1withRSA \
            -digestalg SHA1 \
            -keystore temp.jks \
            -storepass tvbox123 \
            -keypass tvbox123 \
            unsigned.apk tvbox

          mv unsigned.apk signed.apk

      - name: Zipalign
        run: |
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 signed.apk final.apk

      - name: Verify ANDROID.RSA
        run: |
          unzip final.apk
          ls -l META-INF/
          test -f META-INF/ANDROID.RSA

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tvhuiys-signed
          path: final.apk
