name: jvhuiys Build (JAR Sign)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: |
          sdkmanager "build-tools;34.0.0"

      - name: Build Unsigned APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --daemon

          APK=$(find app/build/outputs -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "❌ APK not found!"
            exit 1
          fi

          echo "Original APK: $APK"
          mv "$APK" app/build/outputs/original.apk

          mkdir -p temp_apk
          cd temp_apk
          unzip ../app/build/outputs/original.apk
          rm -rf META-INF/
          cd ..

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ KEYSTORE_BASE64 is empty"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > temp_keystore.jks

      - name: JAR Sign APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd temp_apk
          zip -r ../unsigned.apk . -x "META-INF/*"
          cd ..

          jarsigner -verbose \
            -sigalg SHA1withRSA \
            -digestalg SHA1 \
            -keystore temp_keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            unsigned.apk "$KEY_ALIAS"

          mv unsigned.apk traditional-signed.apk

      - name: Verify ANDROID.RSA / ANDROID.SF
        run: |
          mkdir -p verify
          cd verify
          unzip ../traditional-signed.apk

          echo "📁 META-INF contents:"
          ls -la META-INF/

          if [ -f "META-INF/ANDROID.RSA" ] && [ -f "META-INF/ANDROID.SF" ]; then
            echo "✅ Traditional JAR signature detected"
          else
            echo "❌ ANDROID.RSA / ANDROID.SF NOT FOUND"
            exit 1
          fi

          cd ..
          rm -rf verify

      - name: Zipalign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 \
            traditional-signed.apk final.apk

      - name: Verify APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose final.apk

      - name: Collect APK
        run: |
          mkdir -p apk
          mv final.apk apk/tvhuiys-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tvhuiys-jar-signed
          path: apk/*
