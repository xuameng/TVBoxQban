name: jvhuiys release Sign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "build-tools;34.0.0"

      - name: Build & Unsigned APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          APK=$(find app/build/outputs -name "*.apk" | head -n 1)
          unzip $APK -d temp_apk
          rm -rf temp_apk/META-INF

      - name: Generate Keystore & Sign
        run: |
          keytool -genkeypair \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore temp.jks \
            -storepass tvbox123 \
            -keypass tvbox123 \
            -dname "CN=Android, OU=Android, O=Android, L=Android, S=Android, C=CN"

          cd temp_apk
          zip -r ../unsigned.apk .
          cd ..

          jarsigner -verbose \
            -sigalg SHA1withRSA \
            -digestalg SHA1 \
            -keystore temp.jks \
            -storepass tvbox123 \
            -keypass tvbox123 \
            unsigned.apk android

          mv unsigned.apk signed.apk

      - name: Zipalign
        run: |
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 signed.apk final.apk

      - name: Verify ANDROID.RSA
        run: |
          unzip final.apk
          test -f META-INF/ANDROID.RSA

      - uses: actions/upload-artifact@v4
        with:
          name: com.jvhuiys.player
          path: final.apk
