name: jvhuiys Build

on:
#  push:
#    branches:
#      - main
#  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
          
      - name: Check and Copy Keystore
        run: |
          # 检查是否有TVBoxOSC.jks文件，如果有就复制到app目录
          if [ -f "TVBoxOSC.jks" ]; then
            echo "Found TVBoxOSC.jks, copying to app directory"
            cp TVBoxOSC.jks app/TVBoxOSC.jks
            
            # 配置gradle.properties使用这个keystore
            echo "RELEASE_STORE_FILE=./app/TVBoxOSC.jks" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=TVBoxOSC" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=TVBoxOSC" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=TVBoxOSC" >> gradle.properties
          else
            echo "TVBoxOSC.jks not found, creating a test keystore"
            keytool -genkey -v -keystore app/test-keystore.jks -alias test_key -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass testpass -keypass testpass -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US"
            echo "RELEASE_STORE_FILE=./app/test-keystore.jks" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=test_key" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=testpass" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=testpass" >> gradle.properties
          fi
          
      - name: Apply Same Signing Config as Second Workflow
        run: |
          # 使用与第二个工作流完全相同的签名配置
          if [ -f "TVBoxOSC.jks" ]; then
            signingConfigs=''
            signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyBzaWduaW5nQ29uZmlncy5teUNvbmZpZ1wKICAgICAgICAgICAgfVwK'
            signingConfigs="$(echo "$signingConfigs" |base64 -d )"
            signingConfig="$(echo "$signingConfig" |base64 -d )"
            
            # 应用签名配置到build.gradle
            sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle
          fi
          
      - name: Build With Gradle
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all
          
      - name: Prepare App
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find . -name "*release*.apk" -exec mv {} ${{ github.workspace }}/apk/ \; 2>/dev/null || true
          
      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.jvhuiys.player
          path: ${{ github.workspace }}/apk/*
