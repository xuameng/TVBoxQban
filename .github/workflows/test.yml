name: ABI Split Sign Build (V3)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: |
          sdkmanager "build-tools;34.0.0"

      - name: Build APK (with ABI splits)
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --daemon

      # 🔥 关键步骤：自动查找 APK，不再写死路径
      - name: Verify APK Signature
        run: |
          APK=$(find app/build/outputs -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "❌ Error: APK not found!"
            exit 1
          fi
          echo "✅ Found APK: $APK"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose "$APK"

      - name: Collect APK
        run: |
          mkdir -p apk
          find app/build/outputs -name "*.apk" -exec mv {} apk/ \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-v3-apk
          path: apk/*
