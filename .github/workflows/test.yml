name: jvhuiys Build

on:
#  push:
#    branches:
#      - main
#  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
          
      - name: Use TVBoxOSC Keystore Instead of Default
        run: |
          # 检查是否已有TVBoxOSC.jks文件
          if [ -f "TVBoxOSC.jks" ]; then
            echo "Found TVBoxOSC.jks in root, copying to app directory"
            cp TVBoxOSC.jks app/release-key.jks
            # 配置gradle.properties使用TVBoxOSC的参数
            echo "MYAPP_RELEASE_STORE_FILE=../app/release-key.jks" >> gradle.properties
            echo "MYAPP_RELEASE_STORE_PASSWORD=TVBoxOSC" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_ALIAS=TVBoxOSC" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_PASSWORD=TVBoxOSC" >> gradle.properties
          elif [ -f "app/TVBoxOSC.jks" ]; then
            echo "Found TVBoxOSC.jks in app directory, copying to release-key.jks"
            cp app/TVBoxOSC.jks app/release-key.jks
            # 配置gradle.properties使用TVBoxOSC的参数
            echo "MYAPP_RELEASE_STORE_FILE=../app/release-key.jks" >> gradle.properties
            echo "MYAPP_RELEASE_STORE_PASSWORD=TVBoxOSC" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_ALIAS=TVBoxOSC" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_PASSWORD=TVBoxOSC" >> gradle.properties
          else
            echo "TVBoxOSC.jks not found, using original logic"
            # 如果没有找到TVBoxOSC.jks，使用原有逻辑
            keytool -genkey -v -keystore app/release-key.jks -alias test_key -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass changeit -keypass changeit -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US" -noprompt
            echo "MYAPP_RELEASE_STORE_FILE=../app/release-key.jks" >> gradle.properties
            echo "MYAPP_RELEASE_STORE_PASSWORD=changeit" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_ALIAS=test_key" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_PASSWORD=changeit" >> gradle.properties
          fi
          
      - name: Build With Gradle
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all
          
      - name: Prepare App
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find . -name "*release*.apk" -exec mv {} ${{ github.workspace }}/apk/ \; 2>/dev/null || true
          
      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.jvhuiys.player
          path: ${{ github.workspace }}/apk/*
