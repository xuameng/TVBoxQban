name: jvhuiys Build

on:
#  push:
#    branches:
#      - main
#  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Copy Keystore
        run: |
          # 确保使用与第二个工作流相同的keystore位置
          if [ ! -f TVBoxOSC.jks ]; then
            # 如果根目录没有keystore，则复制一份
            keytool -genkey -v -keystore TVBoxOSC.jks -alias TVBoxOSC -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass TVBoxOSC -keypass TVBoxOSC -dname "CN=TVBoxOSC, OU=TVBox, O=TVBox, L=TVBox, S=TVBox, C=CN"
          fi
          cp TVBoxOSC.jks app/TVBoxOSC.jks
          
      - name: Configure Signing
        run: |
          # 使用与第二个工作流相同的签名配置
          echo "RELEASE_STORE_FILE=./app/TVBoxOSC.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=TVBoxOSC" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=TVBoxOSC" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=TVBoxOSC" >> gradle.properties
          
          # 修改build.gradle以包含与第二个工作流相同的签名配置
          if ! grep -q "signingConfigs" app/build.gradle; then
            sed -i '/android {/a\
    signingConfigs {\
        config {\
            keyAlias '\''TVBoxOSC'\''\
            keyPassword '\''TVBoxOSC'\''\
            storeFile file('\''TVBoxOSC.jks'\'')\
            storePassword '\''TVBoxOSC'\''\
            v2SigningEnabled = true\
        }\
    }' app/build.gradle
          fi
          
          # 确保release和debug构建类型使用相同的签名配置
          if ! grep -q "signingConfig signingConfigs.config" app/build.gradle; then
            sed -i '/buildTypes {/a\
        release {\
            signingConfig = signingConfigs.config\
            minifyEnabled true\
            shrinkResources true\
            proguardFiles getDefaultProguardFile('\''proguard-android-optimize.txt'\''), '\''proguard-rules.pro'\'\
        }\
\
        debug {\
            signingConfig = signingConfigs.config\
            minifyEnabled false\
            proguardFiles getDefaultProguardFile('\''proguard-android-optimize.txt'\'')\
        }' app/build.gradle
          fi
          
      - name: Build With Gradle
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all
          # ./gradlew assembleDebug 
          
      - name: Prepare App
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find . -name "*release*.apk" -exec mv {} ${{ github.workspace }}/apk/ \; 2>/dev/null || true
          
      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.jvhuiys.player
          path: ${{ github.workspace }}/apk/*
