name: Official Sign Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Keystore
        run: |
          # 如果根目录已有 TVBoxOSC.jks，复制到 app 目录
          if [ -f "TVBoxOSC.jks" ]; then
            cp TVBoxOSC.jks TVBoxOSC.jks
          fi

      - name: Configure Gradle Properties
        run: |
          echo "RELEASE_STORE_FILE=./app/TVBoxOSC.jks" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=TVBoxOSC" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=TVBoxOSC" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=TVBoxOSC" >> gradle.properties

      - name: Build With Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --daemon \
            --warning-mode all

      - name: Collect APK
        run: |
          mkdir -p apk
          find . -name "*release*.apk" -exec mv {} apk/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: apk/*
