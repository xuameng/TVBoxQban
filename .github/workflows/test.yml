name: Official Sign Build (V3)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: |
          sdkmanager "build-tools;34.0.0"

      - name: Verify Keystore
        run: |
          pwd
          ls app
          file app/TVBoxOSC.jks

      - name: Configure Gradle Properties
        run: |
          echo "RELEASE_STORE_FILE=TVBoxOSC.jks" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=TVBoxOSC" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=TVBoxOSC" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=TVBoxOSC" >> gradle.properties

      - name: Build With Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --daemon \
            --warning-mode all

      - name: Verify APK Signature
        run: |
          apksigner verify --verbose app/build/outputs/apk/release/*.apk

      - name: Collect APK
        run: |
          mkdir -p apk
          mv app/build/outputs/apk/release/*.apk apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: official-signed-v3-apk
          path: apk/*
