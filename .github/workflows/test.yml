name: jvhuiys Build

on:
#  push:
#    branches:
#      - main
#  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create Keystore
        run: |
          # 创建与第二个工作流相同的keystore
          keytool -genkey -v -keystore app/TVBoxOSC.jks -alias TVBoxOSC -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass TVBoxOSC -keypass TVBoxOSC -dname "CN=TVBoxOSC, OU=TVBox, O=TVBox, L=TVBox, S=TVBox, C=CN" -noprompt
          
      - name: Configure Gradle Properties
        run: |
          # 配置gradle.properties以匹配第二个工作流的签名设置
          echo "RELEASE_STORE_FILE=./app/TVBoxOSC.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=TVBoxOSC" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=TVBoxOSC" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=TVBoxOSC" >> gradle.properties
          
      - name: Add Signing Config to Build Gradle
        run: |
          # 检查是否存在signingConfigs配置，如果不存在则添加
          if ! grep -q "signingConfigs {" app/build.gradle; then
            # 在android块中添加签名配置
            awk '/android {/{found=1} found && /^}$/{ if(!signed) {print "    signingConfigs {\n        config {\n            keyAlias '\''TVBoxOSC'\''\n            keyPassword '\''TVBoxOSC'\''\n            storeFile file('\''TVBoxOSC.jks'\'')\n            storePassword '\''TVBoxOSC'\''\n            v2SigningEnabled = true\n        }\n    }"; signed=1}; print} !found{print}' app/build.gradle > temp.gradle && mv temp.gradle app/build.gradle
          fi
          
          # 确保release和debug都使用相同的签名配置
          sed -i 's/signingConfig = signingConfigs\.config/signingConfig = signingConfigs.config/g' app/build.gradle 2>/dev/null || true
          
          # 如果没有找到signingConfig配置，添加到buildTypes中
          if ! grep -q "signingConfig = signingConfigs.config" app/build.gradle; then
            sed -i '/minifyEnabled true/a\            signingConfig = signingConfigs.config' app/build.gradle 2>/dev/null || true
            sed -i '/minifyEnabled false/a\            signingConfig = signingConfigs.config' app/build.gradle 2>/dev/null || true
          fi
          
      - name: Build With Gradle
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all
          
      - name: Prepare App
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find . -name "*release*.apk" -exec mv {} ${{ github.workspace }}/apk/ \; 2>/dev/null || true
          
      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.jvhuiys.player
          path: ${{ github.workspace }}/apk/*
