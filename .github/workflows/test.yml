name: jvhuiys Build

on:
#  push:
#    branches:
#      - main
#  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
          
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release-key.jks
            echo "MYAPP_RELEASE_STORE_FILE=../app/release-key.jks" >> gradle.properties
            echo "MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> gradle.properties
            echo "MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties
          else
            echo "Using default test keystore"
            cp ${{ github.workspace }}/.github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
            sed -i '$a\RELEASE_STORE_FILE=./TVBoxOSC.jks' ./gradle.properties
            sed -i '$a\RELEASE_KEY_ALIAS=TVBoxOSC' ./gradle.properties
            sed -i '$a\RELEASE_STORE_PASSWORD=TVBoxOSC' ./gradle.properties
            sed -i '$a\RELEASE_KEY_PASSWORD=TVBoxOSC' ./gradle.properties
          fi
          
      - name: Build With Gradle
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all
          # ./gradlew assembleDebug 
          
      - name: Prepare App
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find . -name "*release*.apk" -exec mv {} ${{ github.workspace }}/apk/ \; 2>/dev/null || true
          
      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.jvhuiys.player
          path: ${{ github.workspace }}/apk/*
